<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            background-color: black;
            color: #d3d3d3;
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .info-container {
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        #date-display, #countdown-display {
            font-size: 16px;
            font-weight: normal;
            letter-spacing: 1px;
            line-height: 1;
        }
        #date-display {
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            height: 35px;
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
        }
        input[type="text"] {
            background-color: black;
            color: #d3d3d3;
            border: 1px solid #d3d3d3;
            padding: 5px 10px;
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
            width: 0;
            border-right: none;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            background-color: #111;
        }
        input[type="submit"] {
            background-color: black;
            color: #d3d3d3;
            border: 1px solid #d3d3d3;
            padding: 5px 20px;
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        input[type="submit"]:hover {
            background-color: #d3d3d3;
            color: black;
        }
    </style>
</head>
<body>
    <div class="info-container">
        <div id="date-display">...</div>
        <div id="countdown-display">--d --h --m --s</div>
    </div>
    <form method="POST" id="signup-form">
        {{ form.hidden_tag() }}
        {{ form.email(type="text", placeholder="email address", autocomplete="off", spellcheck="false") }}
        {{ form.submit() }}
    </form>

    <script>
        function getNextTransmission() {
            let now = new Date().getTime();
            
            for (let i = 0; i < 3; i++) {
                let d = new Date();
                let year = d.getFullYear();
                let month = d.getMonth() + i;
                if (month > 11) {
                    year += Math.floor(month / 12);
                    month = month % 12;
                }
                
                let firstDay = new Date(Date.UTC(year, month, 1));
                let dayOfWeek = firstDay.getUTCDay();
                let offset = (5 - dayOfWeek + 7) % 7;
                let fourthFriday = 1 + offset + 21;
                
                let marchSecondSunday = 1 + (7 - new Date(Date.UTC(year, 2, 1)).getUTCDay()) % 7 + 7;
                let novFirstSunday = 1 + (7 - new Date(Date.UTC(year, 10, 1)).getUTCDay()) % 7;
                
                let startEDT = Date.UTC(year, 2, marchSecondSunday, 7);
                let endEDT = Date.UTC(year, 10, novFirstSunday, 6);
                
                let targetUTCStartT = Date.UTC(year, month, fourthFriday, 21);
                let tzOffset = (targetUTCStartT >= startEDT && targetUTCStartT < endEDT) ? 4 : 5;
                
                let startTime = Date.UTC(year, month, fourthFriday, 21 + tzOffset);
                let endTime = Date.UTC(year, month, fourthFriday, 22 + tzOffset);
                
                if (now < endTime) {
                    return {
                        start: startTime,
                        end: endTime,
                        month: month,
                        day: fourthFriday,
                        year: year
                    };
                }
            }
        }

        function updateCountdown() {
            let next = getNextTransmission();
            let now = new Date().getTime();
            
            let display = document.getElementById("countdown-display");
            let dateDisplay = document.getElementById("date-display");
            
            let monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            let dateStr = `${monthNames[next.month]} ${next.day}, ${next.year}`;
            
            if (now >= next.start && now < next.end) {
                dateDisplay.innerHTML = `TRANSMISSION IS LIVE.`;
                display.innerHTML = `00d 00h 00m 00s`;
                return;
            }
            
            let localDate = new Date(next.start);
            let localOptions = { weekday: 'short', hour: '2-digit', minute: '2-digit', hour12: false, timeZoneName: 'short' };
            let localTimeStr = localDate.toLocaleString('en-US', localOptions);
            
            let displayStr = `${dateStr} @ 21:00 EST`;
            if (!localTimeStr.includes('EST') && !localTimeStr.includes('EDT')) {
                displayStr += ` (${localTimeStr})`;
            }
            
            dateDisplay.innerHTML = displayStr;
            
            let diff = next.start - now;
            let days = Math.floor(diff / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            display.innerHTML = `${days}d ${String(hours).padStart(2,'0')}h ${String(minutes).padStart(2,'0')}m ${String(seconds).padStart(2,'0')}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
